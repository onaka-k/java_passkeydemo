server:
  port: 8080

spring:
  datasource:
    url: jdbc:h2:file:./data/passkeydemo;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  h2:
    console:
      enabled: true
      path: /h2-console
  thymeleaf:
    cache: false

app:
  rp-id: localhost
  rp-name: Java Passkey Demo
